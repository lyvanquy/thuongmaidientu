version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: trademart_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trademart
      POSTGRES_PASSWORD: trademart123
      POSTGRES_DB: trademart_db
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trademart_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trademart -d trademart_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trademart_redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    networks:
      - trademart_network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  trademart_network:
    driver: bridge
